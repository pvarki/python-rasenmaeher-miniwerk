on:
    pull_request:
    workflow_dispatch:  # Allow manual triggering

jobs:
  versiontag:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Check version tag
        run: |
          curl -f https://raw.githubusercontent.com/pvarki/python-rasenmaeher-miniwerk/main/pyproject.toml -o /tmp/main_pyproject.toml || touch /tmp/main_pyproject.toml
          grep "version = " pyproject.toml >/tmp/version.txt
          grep "version = " /tmp/main_pyproject.toml >/tmp/main_version.txt
          diff /tmp/main_version.txt /tmp/version.txt && exit 1 || exit 0

  test:
    runs-on: arc-runner-set
    permissions:
      contents: write
      pull-requests: write
      checks: write
    strategy:
      matrix:
        python-version: ["3.11"] # , "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Do pre-commit checks (black, lint, mypy)
        run: |
          uv run docker/pre_commit_init.sh
      - name: Test with pytest
        run: |
          uv run py.test -v --junitxml=pytest.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/pytest*.xml'
          detailed_summary: true
          check_name: 'JUnit report (local)'

  docker_builds:
    runs-on: arc-runner-set
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build test target
        run: docker build --target test -t miniwerk:test .
      - name: Build production target
        run: docker build --target production -t miniwerk:production .
